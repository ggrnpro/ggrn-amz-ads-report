<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Ads Health Report</title>
<style>
  /* ============================================================
     Amazon Ads Health Report. Self-contained template.
     The skill replaces the REPORT_DATA object (bottom of <body>)
     with the real analysis. Everything renders from that object.
     No external requests, so it is safe to open offline or email to a client.
     ============================================================ */
  :root{
    --ink:#232F3E;        /* Amazon squid ink */
    --ink-2:#37475A;
    --accent:#FF9900;     /* Amazon orange */
    --accent-2:#146EB4;   /* Amazon blue */
    --bg:#F3F4F6;
    --card:#FFFFFF;
    --line:#E5E7EB;
    --muted:#6B7280;
    --text:#1F2937;
    --good:#1A9E5E;  --good-bg:#E7F6EE;
    --warn:#C77700;  --warn-bg:#FDF3E2;
    --bad:#D7263D;   --bad-bg:#FBE9EC;
    --crit:#B11226;
    --info:#146EB4;  --info-bg:#E8F1FA;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 4px 16px rgba(16,24,40,.06);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:32px 24px 64px}
  a{color:var(--accent-2)}

  /* ---------- header ---------- */
  .masthead{background:linear-gradient(135deg,var(--ink) 0%,var(--ink-2) 100%);color:#fff;border-radius:var(--radius);padding:28px 30px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .masthead::after{content:"";position:absolute;right:-40px;top:-40px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,153,0,.22),transparent 70%)}
  .masthead h1{margin:0 0 4px;font-size:23px;letter-spacing:-.2px}
  .masthead .sub{color:#C9D3DE;font-size:13.5px}
  .brandline{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .brandline .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;place-items:center;color:var(--ink);font-weight:800;font-size:16px;flex:none}
  .metagrid{display:flex;flex-wrap:wrap;gap:8px 22px;margin-top:14px;font-size:12.5px;color:#D7DEE6}
  .metagrid b{color:#fff;font-weight:600}

  /* ---------- score hero ---------- */
  .hero{display:grid;grid-template-columns:230px 1fr;gap:24px;margin-top:22px}
  @media(max-width:720px){.hero{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .gauge-card{padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .gauge{position:relative;width:180px;height:180px}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .num .s{font-size:46px;font-weight:800;line-height:1;color:var(--ink)}
  .gauge .num .o{font-size:12px;color:var(--muted)}
  .grade-pill{margin-top:12px;font-weight:800;font-size:14px;padding:5px 16px;border-radius:999px}
  .summary-card{padding:22px 24px}
  .summary-card h2{margin:0 0 8px;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .summary-card p{margin:0;color:var(--text);font-size:14px}

  /* ---------- section ---------- */
  section{margin-top:30px}
  .sec-head{display:flex;align-items:center;gap:10px;margin:0 0 14px}
  .sec-head .ic{width:26px;height:26px;border-radius:8px;background:var(--info-bg);display:grid;place-items:center;flex:none}
  .sec-head h2{margin:0;font-size:17px;color:var(--ink);letter-spacing:-.2px}
  .sec-head .note{font-size:12px;color:var(--muted);margin-left:auto}
  .sec-help{font-size:12.5px;color:var(--ink-2);margin:0 0 12px;line-height:1.5;max-width:880px}
  .sec-help b{color:var(--ink)}

  /* ---------- how to read ---------- */
  .howto{padding:18px 22px;background:var(--info-bg);border:1px solid #CFE0F2;margin-top:22px}
  .howto h2{margin:0 0 4px;font-size:15px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .howto .lede{font-size:13px;color:var(--ink-2);margin:0 0 10px}
  .howto ol{margin:0;padding-left:20px}
  .howto li{font-size:13px;color:var(--ink-2);padding:3px 0}
  .howto li b{color:var(--ink)}

  /* ---------- glossary ---------- */
  .gloss{padding:18px 22px}
  .gloss .g-row{display:grid;grid-template-columns:160px 1fr;gap:6px 16px;padding:8px 0;border-bottom:1px solid var(--line)}
  .gloss .g-row:last-child{border-bottom:0}
  .gloss .g-term{font-weight:700;font-size:13px;color:var(--ink)}
  .gloss .g-def{font-size:12.5px;color:var(--ink-2)}
  @media(max-width:640px){.gloss .g-row{grid-template-columns:1fr}}

  /* ---------- KPI cards ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{padding:16px 16px 14px;border-radius:12px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);position:relative}
  .kpi .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:27px;font-weight:800;color:var(--ink);margin:2px 0 2px;font-variant-numeric:tabular-nums}
  .kpi .bm{font-size:12px;color:var(--muted)}
  .kpi .dot{position:absolute;top:14px;right:14px;width:10px;height:10px;border-radius:50%}
  .kpi .hint{font-size:11.5px;color:var(--ink-2);margin-top:7px;border-top:1px dashed var(--line);padding-top:7px;display:none}
  .kpi.has-hint .hint{display:block}

  /* ---------- category bars ---------- */
  .bars{padding:20px 24px}
  .bar-row{display:grid;grid-template-columns:230px 1fr 86px;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
  .bar-row:last-child{border-bottom:0}
  .bar-row .nm{font-size:13px;color:var(--ink-2)}
  .bar-row .nm small{color:var(--muted);font-weight:600}
  .track{height:10px;border-radius:6px;background:#EEF1F4;overflow:hidden}
  .fill{height:100%;border-radius:6px}
  .bar-row .sc{text-align:right;font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums}
  @media(max-width:720px){.bar-row{grid-template-columns:1fr 70px}.bar-row .track{grid-column:1/-1;order:3}}

  /* ---------- findings ---------- */
  .finding{display:grid;grid-template-columns:96px 1fr;gap:16px;padding:16px 18px;border:1px solid var(--line);border-left-width:5px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);margin-bottom:12px}
  .finding .sev{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;border-radius:6px;text-align:center;height:fit-content}
  .finding h3{margin:0 0 5px;font-size:14.5px;color:var(--ink)}
  .finding .meta{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .finding .row{font-size:13px;margin:3px 0}
  .finding .row b{color:var(--ink-2)}
  .sev-critical{border-left-color:var(--crit)} .sev-critical .sev{background:var(--bad-bg);color:var(--crit)}
  .sev-high{border-left-color:var(--bad)} .sev-high .sev{background:var(--bad-bg);color:var(--bad)}
  .sev-medium{border-left-color:var(--warn)} .sev-medium .sev{background:var(--warn-bg);color:var(--warn)}
  .sev-low{border-left-color:var(--accent-2)} .sev-low .sev{background:var(--info-bg);color:var(--accent-2)}

  /* ---------- quick wins ---------- */
  .qw{padding:18px 22px;background:linear-gradient(180deg,var(--good-bg),#fff);border:1px solid #CFEBDD}
  .qw ul{margin:8px 0 0;padding-left:0;list-style:none}
  .qw li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;font-size:13.5px}
  .qw li .chk{color:var(--good);flex:none;margin-top:1px}

  /* ---------- tables ---------- */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:12.8px;background:var(--card)}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:#F8FAFC;color:var(--ink-2);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:0}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .tag.good{background:var(--good-bg);color:var(--good)} .tag.warn{background:var(--warn-bg);color:var(--warn)}
  .tag.bad{background:var(--bad-bg);color:var(--bad)} .tag.info{background:var(--info-bg);color:var(--accent-2)}

  /* ---------- funnel / two-col ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.grid2{grid-template-columns:1fr}}
  .panel{padding:18px 20px}
  .panel h3{margin:0 0 10px;font-size:13.5px;color:var(--ink)}
  .read{font-size:12.5px;color:var(--ink-2);background:#F8FAFC;border-radius:8px;padding:8px 10px;margin-top:4px}

  /* ---------- action plan ---------- */
  .ap-row{border-left:4px solid var(--line);padding:4px 0 4px 14px;margin:0 0 12px}
  .ap-row.p1{border-left-color:var(--crit)} .ap-row.p2{border-left-color:var(--bad)}
  .ap-row.p3{border-left-color:var(--warn)} .ap-row.p4{border-left-color:var(--accent-2)}
  .ap-row .t{font-weight:600;font-size:14px;color:var(--ink)}
  .ap-row .d{font-size:12px;color:var(--muted);margin-top:2px}

  /* ---------- chips / footer ---------- */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff}
  .chip.miss{background:var(--bad-bg);border-color:#F3CBD2;color:var(--bad)}
  .chip.have{background:var(--good-bg);border-color:#CFEBDD;color:var(--good)}
  footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);text-align:center}
  .disclaimer{font-size:11px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:12px 14px;margin-top:18px}
  .empty{color:var(--muted);font-size:13px;font-style:italic}

  /* ---------- confidence ---------- */
  .conf{padding:20px 24px}
  .conf-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .conf-meter{flex:1;min-width:220px}
  .conf-track{height:14px;border-radius:8px;background:#EEF1F4;overflow:hidden}
  .conf-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#D7263D,#C77700 45%,#1A9E5E)}
  .conf-num{font-size:30px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1}
  .conf-lvl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:4px 10px;border-radius:999px}
  .conf-basis{font-size:12.5px;color:var(--ink-2);margin-top:12px;background:#F8FAFC;border-radius:8px;padding:8px 10px}
  .boost{margin-top:14px}
  .boost h3{margin:0 0 8px;font-size:13px;color:var(--ink)}
  .boost .b-row{display:grid;grid-template-columns:1fr 70px;gap:6px 12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .boost .b-row:last-child{border-bottom:0}
  .boost .b-item{font-size:13px;font-weight:600;color:var(--ink-2)}
  .boost .b-add{font-size:13px;font-weight:800;color:var(--good);text-align:right}
  .boost .b-why{grid-column:1/-1;font-size:12px;color:var(--muted);margin-top:-2px}

  /* ---------- authorship ---------- */
  .author{margin-top:22px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:12.5px;color:var(--ink-2)}
  .author .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px}
  .author a{color:var(--accent-2);text-decoration:none;font-weight:600}
  .author a:hover{text-decoration:underline}

  @media print{
    body{background:#fff}
    .wrap{max-width:none;padding:0}
    .card,.kpi,.finding,.tbl-wrap{box-shadow:none}
    section{break-inside:avoid}
    .finding,.bar-row,.ap-row{break-inside:avoid}
    .masthead::after{display:none}
  }
</style>
</head>

      p.innerHTML=`<h3>Ad problem vs listing problem</h3>${D.funnel.diagnosis?`<div class="read">${D.funnel.diagnosis}</div>`:''}
        ${has(D.funnel.rows)?`<div class="tbl-wrap" style="margin-top:10px;border:0;box-shadow:none"><table><thead><tr><th>Signal</th><th class="num">Value</th><th class="num">Benchmark</th><th>Read</th></tr></thead><tbody>
        ${D.funnel.rows.map(r=>`<tr><td>${r.metric}</td><td class="num">${r.value}</td><td class="num">${r.benchmark}</td><td style="white-space:normal">${r.read}</td></tr>`).join('')}</tbody></table></div>`:''}`;
      g.appendChild(p);
    }
    if(has(D.ad_types)){
      const p=E('div','card panel');
      p.innerHTML=`<h3>By ad type</h3>`+D.ad_types.map(t=>{
        const sc=t.score==null?'<span class="tag info">n/a</span>':`<span class="tag ${t.score>=75?'good':t.score>=60?'warn':'bad'}">${t.score}</span>`;
        return `<div style="padding:8px 0;border-bottom:1px solid var(--line)"><div style="display:flex;justify-content:space-between;align-items:center"><b style="font-size:13px;color:var(--ink)">${t.type}</b> ${sc}</div>
        ${has(t.notes)?`<ul style="margin:4px 0 0;padding-left:16px;font-size:12px;color:var(--ink-2)">${t.notes.map(n=>`<li>${n}</li>`).join('')}</ul>`:''}</div>`;
      }).join('');
      g.appendChild(p);
    }
    s.appendChild(g); app.appendChild(s);
  }

  /* ---- action plan ---- */
  if(has(D.action_plan)){
    const s=E('section'); s.appendChild(sec('flag','Prioritized action plan',null,'Your to-do list, in order. If you only do one thing this week, do number 1. Each item names who should do it and the payoff to expect.'));
    const card=E('div','card panel');
    [...D.action_plan].sort((a,b)=>(a.priority||9)-(b.priority||9)).forEach(a=>{
      const row=E('div','ap-row p'+(a.priority||4));
      row.innerHTML=`<div class="t">${a.priority? a.priority+'. ':''}${a.action}</div>
        <div class="d">${[a.owner&&('Owner: '+a.owner),a.eta&&('ETA: '+a.eta),a.impact&&('Impact: '+a.impact)].filter(Boolean).join('  ·  ')}</div>`;
      card.appendChild(row);
    });
    s.appendChild(card); app.appendChild(s);
  }

  /* ---- data coverage ---- */
  if(has(D.data_provided)||has(D.data_missing)){
    const s=E('section'); s.appendChild(sec('folder','Data coverage',null,'Green files were used in this report. Red files were not provided. Adding the red ones next time gives a more accurate and complete picture.'));
    const card=E('div','card panel');
    const chips=E('div','chips');
    (D.data_provided||[]).forEach(d=>chips.appendChild(E('span','chip have',ic(ICONS.check)+' '+d)));
    (D.data_missing||[]).forEach(d=>chips.appendChild(E('span','chip miss','+ '+d+' (not provided)')));
    card.appendChild(chips);
    if(has(D.data_missing)) card.appendChild(E('div','read','Adding the missing reports above would raise confidence. See the data-collection guide for how to export each.'));
    s.appendChild(card); app.appendChild(s);
  }

  /* ---- glossary ---- */
  if(has(D.glossary)){
    const s=E('section'); s.appendChild(sec('list','Plain-English glossary',null,'Quick definitions for the terms in this report, in everyday language.'));
    const card=E('div','card gloss');
    D.glossary.forEach(g=>{
      const row=E('div','g-row');
      row.innerHTML=`<div class="g-term">${g.term}</div><div class="g-def">${g.plain}</div>`;
      card.appendChild(row);
    });
    s.appendChild(card); app.appendChild(s);
  }

  /* ---- disclaimer + authorship + footer ---- */
  if(m.analyst_note) app.appendChild(E('div','disclaimer',m.analyst_note));
  const auth=E('div','author');
  auth.innerHTML=`<span class="av">OG</span><span>Built by <a href="https://ggrn.pro" target="_blank" rel="noopener">Oleg Gagarin · ggrn.pro</a></span>`;
  app.appendChild(auth);
  app.appendChild(E('footer',null,'Amazon Ads Analyzer · Benchmarks are directional averages. Your margin and stage determine the right targets · This is an analysis aid, not financial advice. Not affiliated with Amazon.'));
})();
</script>
</body>
</html>
