<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Ads Health Report</title>
<style>
  /* ============================================================
     Amazon Ads Health Report. Self-contained dark template.
     Renders entirely from the REPORT_DATA object near the bottom.
     No external requests, so it is safe offline and to email.
     Scene: a seller or PPC manager reading ad health late in the
     workday on a laptop in a dim room. Dark, dense, considered.
     ============================================================ */
  :root{
    color-scheme: dark;
    /* OKLCH tokens, neutrals tinted toward the navy hue (262) */
    --bg:       oklch(0.165 0.020 262);
    --bg-2:     oklch(0.135 0.018 262);
    --s1:       oklch(0.205 0.022 262);   /* surface 1 */
    --s2:       oklch(0.245 0.024 262);   /* surface 2 (raised) */
    --s3:       oklch(0.285 0.026 262);   /* surface 3 (rails/tracks) */
    --line:     oklch(0.320 0.022 262);
    --line-2:   oklch(0.400 0.024 262);
    --text:     oklch(0.965 0.010 262);
    --muted:    oklch(0.760 0.018 262);
    --faint:    oklch(0.620 0.018 262);
    --accent:   oklch(0.800 0.150 62);    /* Amazon-orange family */
    --accent-d: oklch(0.700 0.150 62);
    --blue:     oklch(0.720 0.120 245);
    --good:     oklch(0.760 0.150 155);
    --warn:     oklch(0.820 0.150 85);
    --bad:      oklch(0.680 0.190 25);
    --good-bg:  oklch(0.300 0.060 155);
    --warn-bg:  oklch(0.320 0.060 85);
    --bad-bg:   oklch(0.320 0.080 25);
    --info-bg:  oklch(0.300 0.050 245);

    --radius:16px; --radius-sm:11px;
    --e1:0 1px 0 oklch(1 0 0 / .04) inset, 0 1px 2px oklch(0 0 0 / .35), 0 8px 24px oklch(0 0 0 / .28);
    --e2:0 1px 0 oklch(1 0 0 / .06) inset, 0 2px 6px oklch(0 0 0 / .40), 0 18px 50px oklch(0 0 0 / .40);
    --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --ease:cubic-bezier(.22,1,.36,1);   /* ease-out-quint */
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--font);
    line-height:1.55; -webkit-font-smoothing:antialiased; font-feature-settings:"cv05","ss01";
    background-image:
      radial-gradient(900px 500px at 88% -8%, oklch(0.80 0.15 62 / .10), transparent 60%),
      radial-gradient(700px 600px at -5% 0%, oklch(0.72 0.12 245 / .08), transparent 55%),
      linear-gradient(oklch(1 0 0 / .015) 1px, transparent 1px),
      linear-gradient(90deg, oklch(1 0 0 / .015) 1px, transparent 1px);
    background-size:auto,auto,34px 34px,34px 34px;
    background-attachment:fixed;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:34px 24px 72px}
  a{color:var(--accent)}
  .tnum{font-variant-numeric:tabular-nums}

  /* ---------- reveal animation ---------- */
  .reveal{opacity:0;transform:translateY(14px)}
  .reveal.in{opacity:1;transform:none;transition:opacity .6s var(--ease),transform .7s var(--ease)}
  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1!important;transform:none!important;transition:none!important}
    .fn2-band,.fn2-count{opacity:1!important;transform:none!important;transition:none!important}
    .kpi .you{left:var(--e)!important;transition:none!important}
    *{animation:none!important}
  }

  /* ---------- masthead ---------- */
  .masthead{position:relative;overflow:hidden;border-radius:var(--radius);padding:30px 32px;
    background:linear-gradient(160deg, var(--s1), var(--bg-2));
    border:1px solid var(--line);box-shadow:var(--e2)}
  .masthead::before{content:"";position:absolute;inset:0;
    background:radial-gradient(420px 220px at 92% -30%, oklch(0.80 0.15 62 / .22), transparent 70%);pointer-events:none}
  .brandline{display:flex;align-items:center;gap:10px;margin-bottom:14px;position:relative}
  .brandline .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;
    background:linear-gradient(150deg,var(--accent),var(--accent-d));color:oklch(0.20 0.02 262);font-weight:800;box-shadow:0 6px 18px oklch(0.80 0.15 62 / .35)}
  .brandline .k{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
  .masthead h1{margin:0 0 6px;font-size:25px;letter-spacing:-.4px;position:relative}
  .masthead .sub{color:var(--muted);font-size:13.5px;position:relative}
  .metagrid{display:flex;flex-wrap:wrap;gap:6px 26px;margin-top:16px;font-size:12.5px;color:var(--faint);position:relative}
  .metagrid b{color:var(--text);font-weight:600}

  /* ---------- section scaffold ---------- */
  section{margin-top:34px}
  .sec-head{display:flex;align-items:center;gap:11px;margin:0 0 6px}
  .sec-head .ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;color:var(--accent);
    background:oklch(0.80 0.15 62 / .12);border:1px solid oklch(0.80 0.15 62 / .22)}
  .sec-head h2{margin:0;font-size:18px;letter-spacing:-.3px}
  .sec-head .note{font-size:11.5px;color:var(--faint);margin-left:auto;text-transform:uppercase;letter-spacing:.08em}
  .sec-help{font-size:12.5px;color:var(--muted);margin:0 0 16px;line-height:1.55;max-width:880px}
  .sec-help b{color:var(--text)}
  .card{background:var(--s1);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--e1)}

  /* ---------- hero ---------- */
  .hero{display:grid;grid-template-columns:268px 1fr;gap:20px;margin-top:22px}
  @media(max-width:760px){.hero{grid-template-columns:1fr}}
  .gauge-card{padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
  .gauge-card::after{content:"";position:absolute;width:240px;height:240px;border-radius:50%;
    background:radial-gradient(circle, oklch(0.80 0.15 62 / .16), transparent 62%);top:-30px;filter:blur(8px)}
  .gauge{position:relative;width:206px;height:206px}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .num .s{font-size:54px;font-weight:800;line-height:1;letter-spacing:-1px}
  .gauge .num .o{font-size:12px;color:var(--faint);margin-top:2px}
  .grade-pill{margin-top:14px;font-weight:700;font-size:13px;padding:6px 16px;border-radius:999px;border:1px solid var(--line-2);position:relative}
  .summary-card{padding:26px 28px;position:relative;overflow:hidden}
  .summary-card h2{margin:0 0 10px;font-size:14px;letter-spacing:.02em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
  .summary-card p{margin:0;font-size:15px;line-height:1.6;color:oklch(0.92 0.012 262)}

  /* ---------- how to read ---------- */
  .howto{padding:20px 24px;border:1px solid oklch(0.72 0.12 245 / .35);
    background:linear-gradient(160deg, oklch(0.30 0.05 245 / .55), oklch(0.20 0.022 262 / .4))}
  .howto h2{margin:0 0 4px;font-size:15px;display:flex;align-items:center;gap:8px}
  .howto .lede{font-size:13px;color:var(--muted);margin:0 0 12px}
  .howto ol{margin:0;padding-left:20px} .howto li{font-size:13px;color:oklch(0.88 0.012 262);padding:4px 0}
  .howto li b{color:var(--text)}

  /* ---------- confidence ---------- */
  .conf{padding:22px 24px}
  .conf-top{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .conf-num{font-size:34px;font-weight:800;letter-spacing:-1px}
  .conf-lvl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 11px;border-radius:999px}
  .conf-meter{flex:1;min-width:220px}
  .conf-track{height:12px;border-radius:8px;background:var(--s3);overflow:hidden;border:1px solid var(--line)}
  .conf-fill{height:100%;border-radius:8px;transform-origin:left;transform:scaleX(0);
    background:linear-gradient(90deg,var(--bad),var(--warn) 48%,var(--good));transition:transform 1.1s var(--ease) .15s}
  .conf-basis{font-size:12.5px;color:var(--muted);margin-top:14px;background:var(--s2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px}
  .boost{margin-top:14px}
  .boost h3{margin:0 0 8px;font-size:13px;color:var(--text)}
  .b-row{display:grid;grid-template-columns:1fr 64px;gap:4px 12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .b-row:last-child{border-bottom:0}
  .b-item{font-size:13px;font-weight:600;color:oklch(0.9 0.012 262)}
  .b-add{font-size:13px;font-weight:800;color:var(--good);text-align:right}
  .b-why{grid-column:1/-1;font-size:12px;color:var(--faint);margin-top:-2px}

  /* ---------- metric tiles (bullet vs benchmark) ---------- */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
  @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{padding:15px 16px 14px;border-radius:var(--radius-sm);background:var(--s1);border:1px solid var(--line);position:relative;box-shadow:var(--e1)}
  .kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);font-weight:600}
  .kpi .val{font-size:25px;font-weight:800;letter-spacing:-.5px;margin:3px 0 1px}
  .kpi .bm{font-size:11.5px;color:var(--muted);min-height:15px}
  .kpi .dot{position:absolute;top:15px;right:15px;width:9px;height:9px;border-radius:50%}
  /* you-vs-target gauge: green zone is healthy, the line is your break-even/target, the dot is you */
  .kpi .kbar{margin-top:14px}
  .kpi .tkwrap{position:relative;padding-top:5px}
  .kpi .tk{display:flex;height:9px;border-radius:6px;overflow:hidden;border:1px solid var(--line);background:var(--s3)}
  .kpi .tk .z{height:100%}
  .kpi .tk .zok{background:oklch(0.76 0.15 155 / .34)}
  .kpi .tk .zno{background:oklch(0.68 0.19 25 / .22)}
  .kpi .tgt{position:absolute;top:1px;height:18px;width:2px;border-radius:2px;background:var(--text);opacity:.85;transform:translateX(-50%)}
  .kpi .you{position:absolute;top:9px;width:13px;height:13px;border-radius:50%;border:2px solid var(--s1);box-shadow:0 1px 4px oklch(0.12 0.02 262 / .6);transform:translate(-50%,-50%);left:var(--s);transition:left .9s var(--ease) .15s;z-index:2}
  .reveal.in .kpi .you{left:var(--e)}
  .kpi .klg{display:flex;gap:13px;align-items:center;margin-top:11px;font-size:10.5px;color:var(--faint)}
  .kpi .klg i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .kpi .klg .d{width:9px;height:9px;border-radius:50%}
  .kpi .klg .t{width:2px;height:11px;border-radius:2px;background:var(--text);opacity:.8}
  .kpi .hint{font-size:11.5px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line);padding-top:9px;display:none}
  .kpi.has-hint .hint{display:block}

  /* ---------- category bars ---------- */
  .bars{padding:18px 22px;position:relative}
  .bar-row{display:grid;grid-template-columns:240px 1fr 64px;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--line)}
  .bar-row:last-child{border-bottom:0}
  .bar-row .nm{font-size:13px;color:oklch(0.88 0.012 262)}
  .bar-row .nm small{color:var(--faint);font-weight:600}
  .track{height:9px;border-radius:6px;background:var(--s3);overflow:hidden;border:1px solid var(--line);position:relative}
  .track::before,.track::after{content:"";position:absolute;top:0;bottom:0;width:1px;background:var(--line)}
  .track::before{left:60%} .track::after{left:75%}
  .fill{height:100%;border-radius:6px;transform-origin:left;transform:scaleX(0);transition:transform .9s var(--ease)}
  .bar-row .sc{text-align:right;font-weight:800;font-size:14px}
  @media(max-width:720px){.bar-row{grid-template-columns:1fr 56px}.bar-row .track{grid-column:1/-1;order:3}}

  /* ---------- quick wins ---------- */
  .qw{padding:20px 24px;border:1px solid oklch(0.76 0.15 155 / .30);
    background:linear-gradient(160deg, oklch(0.30 0.06 155 / .40), oklch(0.20 0.022 262 / .3))}
  .qw ul{margin:0;padding:0;list-style:none}
  .qw li{display:flex;gap:12px;align-items:flex-start;padding:8px 0;font-size:13.5px;border-bottom:1px solid oklch(1 0 0 / .05)}
  .qw li:last-child{border-bottom:0}
  .qw .n{flex:none;width:22px;height:22px;border-radius:7px;display:grid;place-items:center;background:oklch(0.76 0.15 155 / .18);color:var(--good);font-size:11px;font-weight:800;border:1px solid oklch(0.76 0.15 155 / .3)}

  /* ---------- findings (no side stripes) ---------- */
  .finding{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:18px 20px;border-radius:var(--radius-sm);
    background:var(--s1);border:1px solid var(--line);box-shadow:var(--e1);margin-bottom:13px;transition:transform .25s var(--ease),border-color .25s var(--ease)}
  .finding:hover{transform:translateY(-2px);border-color:var(--line-2)}
  .finding .badge{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-weight:800;font-size:15px;align-self:start}
  .finding h3{margin:0 0 6px;font-size:15px;letter-spacing:-.2px}
  .finding .meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .finding .chip{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:6px;border:1px solid var(--line-2);color:var(--muted)}
  .finding .chip.sev{color:#fff}
  .finding .row{font-size:13.5px;margin:5px 0;color:oklch(0.88 0.012 262)}
  .finding .row b{color:var(--text);font-weight:600}
  .finding .row.act{background:var(--s2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-top:9px}
  .sev-critical .badge{background:var(--bad-bg);color:var(--bad);border:1px solid var(--bad)} .sev-critical .chip.sev{background:var(--bad)}
  .sev-high .badge{background:var(--bad-bg);color:var(--bad);border:1px solid oklch(0.68 0.19 25 / .5)} .sev-high .chip.sev{background:var(--bad)}
  .sev-medium .badge{background:var(--warn-bg);color:var(--warn);border:1px solid oklch(0.82 0.15 85 / .5)} .sev-medium .chip.sev{background:oklch(0.55 0.13 85)}
  .sev-low .badge{background:var(--info-bg);color:var(--blue);border:1px solid oklch(0.72 0.12 245 / .5)} .sev-low .chip.sev{background:oklch(0.5 0.11 245)}

  /* ---------- funnel chart (centered, log-scaled so every stage stays legible) ---------- */
  .funnel{padding:22px 24px}
  .fn-title{margin:0 0 16px;font-size:13.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .fn2{display:grid;grid-template-columns:140px 1fr 128px;row-gap:0;align-items:center}
  .fn2-name{font-size:12.5px;color:oklch(0.88 0.012 262);padding-right:8px}
  .fn2-cell{position:relative;height:56px}
  .fn2-band{position:absolute;inset:0;background:var(--blue);
    clip-path:polygon(calc(50% - var(--top)/2) 0, calc(50% + var(--top)/2) 0, calc(50% + var(--bot)/2) 100%, calc(50% - var(--bot)/2) 100%);
    box-shadow:inset 0 1px 0 oklch(1 0 0 / .16);
    opacity:0;transform:translateY(9px);transition:opacity .55s var(--ease),transform .6s var(--ease);transition-delay:calc(var(--i)*80ms)}
  .reveal.in .fn2-band{opacity:1;transform:none}
  .fn2-count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:oklch(0.99 0 0);text-shadow:0 1px 2px oklch(0.16 0.03 262 / .6);
    font-variant-numeric:tabular-nums;pointer-events:none;opacity:0;transition:opacity .5s var(--ease);transition-delay:calc(var(--i)*80ms + 140ms)}
  .reveal.in .fn2-count{opacity:1}
  .fn2-step{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:0;padding-left:8px}
  .fn2-step .p{font-weight:800;font-size:15px;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.2}
  .fn2-step .a{color:var(--faint);font-size:10px;letter-spacing:.02em}
  @media(max-width:720px){.fn2{grid-template-columns:80px 1fr 86px}.fn2-name{font-size:11px}.fn2-cell{height:48px}.fn2-count{font-size:13px}.fn2-step .p{font-size:13px}}

  /* ---------- tables ---------- */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-sm);box-shadow:var(--e1)}
  table{border-collapse:collapse;width:100%;font-size:12.8px;background:var(--s1)}
  th,td{padding:11px 13px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{background:var(--s2);color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;position:sticky;top:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody tr{transition:background .15s} tbody tr:hover{background:var(--s2)}
  tr:last-child td{border-bottom:0}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;border:1px solid transparent}
  .tag.good{background:var(--good-bg);color:var(--good);border-color:oklch(0.76 0.15 155 / .4)}
  .tag.warn{background:var(--warn-bg);color:var(--warn);border-color:oklch(0.82 0.15 85 / .4)}
  .tag.bad{background:var(--bad-bg);color:var(--bad);border-color:oklch(0.68 0.19 25 / .4)}
  .tag.info{background:var(--info-bg);color:var(--blue);border-color:oklch(0.72 0.12 245 / .4)}
  .sub-h{font-size:12.5px;font-weight:700;margin:4px 0 8px;display:flex;align-items:center;gap:7px}
  .sub-h.up{color:var(--good)} .sub-h.down{color:var(--bad)}

  /* ---------- two-col ---------- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .panel{padding:20px 22px}
  .panel h3{margin:0 0 12px;font-size:13.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .read{font-size:13px;color:oklch(0.88 0.012 262);background:var(--s2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .atype{padding:11px 0;border-bottom:1px solid var(--line)} .atype:last-child{border-bottom:0}
  .atype .t{display:flex;justify-content:space-between;align-items:center}
  .atype b{font-size:13.5px} .atype ul{margin:6px 0 0;padding-left:17px;font-size:12px;color:var(--muted)}

  /* ---------- action plan ---------- */
  .ap{padding:6px 0}
  .ap-row{display:grid;grid-template-columns:38px 1fr;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line)}
  .ap-row:last-child{border-bottom:0}
  .ap-row .pr{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:15px;background:var(--s2);border:1px solid var(--line-2);color:var(--accent)}
  .ap-row.p1 .pr{background:oklch(0.68 0.19 25 / .18);color:var(--bad);border-color:var(--bad)}
  .ap-row .t{font-weight:600;font-size:14.5px;letter-spacing:-.1px}
  .ap-row .d{font-size:12px;color:var(--faint);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap}
  .ap-row .d span{background:var(--s2);border:1px solid var(--line);border-radius:6px;padding:2px 8px}

  /* ---------- glossary, chips, footer ---------- */
  .gloss{padding:18px 22px}
  .g-row{display:grid;grid-template-columns:170px 1fr;gap:6px 18px;padding:10px 0;border-bottom:1px solid var(--line)}
  .g-row:last-child{border-bottom:0}
  .g-term{font-weight:700;font-size:13px;color:var(--accent)}
  .g-def{font-size:12.5px;color:var(--muted)}
  @media(max-width:640px){.g-row{grid-template-columns:1fr}}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip-d{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--s2);display:flex;align-items:center;gap:7px}
  .chip-d.have{border-color:oklch(0.76 0.15 155 / .4);color:var(--good)}
  .chip-d.miss{border-color:oklch(0.68 0.19 25 / .35);color:var(--bad)}
  .author{margin-top:26px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:12.5px;color:var(--muted)}
  .author .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(150deg,var(--accent),var(--blue));display:grid;place-items:center;color:#fff;font-weight:800;font-size:11px}
  .author a{color:var(--accent);text-decoration:none;font-weight:600}
  footer{margin-top:18px;padding-top:18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--faint);text-align:center}

      const p=E('div','card panel');
      p.innerHTML=`<h3>${T('ad_or_listing')}</h3>${D.funnel.diagnosis?`<div class="read">${D.funnel.diagnosis}</div>`:''}
        ${has(D.funnel.rows)?`<div class="tbl-wrap" style="margin-top:12px;border:0;box-shadow:none"><table><thead><tr><th>${T('th_signal')}</th><th class="num">${T('th_value')}</th><th class="num">${T('th_benchmark')}</th><th>${T('th_read')}</th></tr></thead><tbody>${D.funnel.rows.map(r=>`<tr><td>${r.metric}</td><td class="num">${r.value}</td><td class="num">${r.benchmark}</td><td style="white-space:normal">${r.read}</td></tr>`).join('')}</tbody></table></div>`:''}`;
      g.appendChild(p);
    }
    if(has(D.ad_types)){
      const p=E('div','card panel');p.innerHTML='<h3>'+T('by_ad_type')+'</h3>'+D.ad_types.map(t=>{
        const sc=t.score==null?'<span class="tag info">n/a</span>':`<span class="tag ${t.score>=75?'good':t.score>=60?'warn':'bad'}">${t.score}</span>`;
        return `<div class="atype"><div class="t"><b>${t.type}</b> ${sc}</div>${has(t.notes)?`<ul>${t.notes.map(n=>`<li>${n}</li>`).join('')}</ul>`:''}</div>`;}).join('');
      g.appendChild(p);
    }
    if(g.childNodes.length)s.appendChild(g);app.appendChild(s);
  }

  /* action plan */
  if(has(D.action_plan)){
    const s=E('section','reveal');s.appendChild(sec('flag',T('ap_title'),null,T('ap_help')));
    const card=E('div','card ap');
    [...D.action_plan].sort((a,b)=>(a.priority||9)-(b.priority||9)).forEach(a=>{
      const row=E('div','ap-row p'+(a.priority||4));
      row.innerHTML=`<div class="pr">${a.priority||'·'}</div><div><div class="t">${a.action}</div>
        <div class="d">${[a.owner&&`<span>${T('owner')} ${a.owner}</span>`,a.eta&&`<span>${T('eta')} ${a.eta}</span>`,a.impact&&`<span>${T('impact_label')} ${a.impact}</span>`].filter(Boolean).join('')}</div></div>`;
      card.appendChild(row);
    });
    s.appendChild(card);app.appendChild(s);
  }

  /* data coverage */
  if(has(D.data_provided)||has(D.data_missing)){
    const s=E('section','reveal');s.appendChild(sec('folder',T('data_title'),null,T('data_help')));
    const card=E('div','card panel');const chips=E('div','chips');
    (D.data_provided||[]).forEach(d=>chips.appendChild(E('span','chip-d have',ic(I.check)+' '+d)));
    (D.data_missing||[]).forEach(d=>chips.appendChild(E('span','chip-d miss','+ '+d)));
    card.appendChild(chips);s.appendChild(card);app.appendChild(s);
  }

  /* glossary */
  if(has(D.glossary)){
    const s=E('section','reveal');s.appendChild(sec('list',T('gloss_title'),null,T('gloss_help')));
    const card=E('div','card gloss');
    D.glossary.forEach(gg=>{const row=E('div','g-row');row.innerHTML=`<div class="g-term">${gg.term}</div><div class="g-def">${gg.plain}</div>`;card.appendChild(row);});
    s.appendChild(card);app.appendChild(s);
  }

  /* disclaimer + author */
  if(m.analyst_note)app.appendChild(E('div','disclaimer reveal',m.analyst_note));
  const auth=E('div','author');auth.innerHTML=`<span class="av">OG</span><span>${T('built_by')} <a href="https://ggrn.pro" target="_blank" rel="noopener">Oleg Gagarin · ggrn.pro</a></span>`;
  app.appendChild(auth);
  app.appendChild(E('footer',null,T('footer')));

  /* ---------- animation engine ---------- */
  function countUp(el,to){
    if(!el)return;const suf=el.getAttribute('data-suffix')||'';
    if(reduce){el.textContent=to+suf;return;}
    const dur=900,t0=performance.now();
    function tick(t){const p=clamp((t-t0)/dur,0,1);const e=1-Math.pow(1-p,4);
      el.textContent=Math.round(to*e)+suf;if(p<1)requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
  }
  function fire(node){
    node.querySelectorAll('[data-scale]').forEach(el=>{const v=parseFloat(el.getAttribute('data-scale'))||0;
      if(reduce){el.style.transform=`scaleX(${v})`;}else{requestAnimationFrame(()=>el.style.transform=`scaleX(${v})`);}});
    node.querySelectorAll('[data-count]').forEach(el=>countUp(el,parseFloat(el.getAttribute('data-count'))||0));
    if(node._anim)node._anim();
  }
  const io=('IntersectionObserver'in window)?new IntersectionObserver((ents)=>{
    ents.forEach(en=>{if(en.isIntersecting){en.target.classList.add('in');fire(en.target);io.unobserve(en.target);}});
  },{threshold:.12,rootMargin:'0px 0px -40px 0px'}):null;
  document.querySelectorAll('.reveal').forEach((el,i)=>{
    if(io){io.observe(el);}else{el.classList.add('in');fire(el);}
  });
  // ensure first screen reveals even before scroll
  requestAnimationFrame(()=>document.querySelectorAll('.reveal').forEach(el=>{
    const r=el.getBoundingClientRect();if(r.top<window.innerHeight){el.classList.add('in');fire(el);if(io)io.unobserve(el);}
  }));
})();
</script>
</body>
</html>
